name: AskTwin
options:
  bundleIdPrefix: com.askkaya
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: AskKaya
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  AskTwin:
    type: application
    platform: macOS
    sources:
      - path: AskTwin
        excludes:
          - "**/.DS_Store"
          - "Resources/askkaya"
    postCompileScripts:
      - script: |
          cp "${SRCROOT}/AskTwin/Resources/askkaya" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/askkaya"
          chmod +x "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/askkaya"
        name: Copy CLI Binary
    settings:
      base:
        INFOPLIST_FILE: AskTwin/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: AskTwin/Resources/AskTwin.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
    entitlements:
      path: AskTwin/Resources/AskTwin.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.bookmarks.app-scope: true

schemes:
  AskTwin:
    build:
      targets:
        AskTwin: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
